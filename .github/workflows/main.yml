name: Automação Diária de Ponto

on:
  schedule:
    # Acorda às 09:40 UTC (06:40 BRT) e 19:40 UTC (16:40 BRT) de seg a sex
    # Acordamos 20 minutos antes para absorver qualquer atraso dos servidores do GitHub
    - cron: '40 9,19 * * 1-5'
  workflow_dispatch: 

jobs:
  ponto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Dependencias
        run: |
          pip install playwright tzdata
          playwright install --with-deps chromium
      - name: Executar Script
        env:
          SITE_USUARIO: ${{ secrets.SITE_USUARIO }}
          SITE_SENHA: ${{ secrets.SITE_SENHA }}
        run: python script.py
